<div
  appHighlight="lightblue"
  [ngClass]="cardClasses"
  [ngStyle]="{
    'border-left':
      course.gradeStatus === 'passed'
        ? '5px solid green'
        : course.gradeStatus === 'failed'
        ? '5px solid red'
        : '5px solid gray'
  }">

  <h3>{{ course.name }}</h3>

  <p>Course ID: {{ course.id }}</p>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">
    <p *ngSwitchCase="'passed'">🟢 Passed</p>
    <p *ngSwitchCase="'failed'">🔴 Failed</p>
    <p *ngSwitchCase="'pending'">⚪ Pending</p>
  </div>

  <button (click)="requestEnrollment()">
    Enroll
  </button>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

</div>
