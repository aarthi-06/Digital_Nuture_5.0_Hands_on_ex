<h1>{{ portalName }}</h1>

<p>
  Manage your courses, view your profile, and track your academic progress.
</p>

<div>
  <p>Courses Available: 12</p>
  <p>Enrolled: 3</p>
  <p>GPA: 3.8</p>
</div>

<!-- Property binding sends data from component to the DOM.
     ngModel provides two-way binding between component and input. -->

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br>

<label for="search">Search course:</label>

<input
  id="search"
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Enter course name">

<p>Searching for: {{ searchTerm }}</p>
